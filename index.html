<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RevPCBAI - Panneau de Contrôle</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; text-align: center; padding: 40px; }
        .container { max-width: 600px; margin: auto; background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .status-dot { height: 12px; width: 12px; background-color: #22c55e; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #22c55e; }
        .btn-pay { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border: none; padding: 18px 35px; border-radius: 12px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: transform 0.2s; margin-top: 20px; width: 100%; }
        .btn-pay:hover { transform: scale(1.02); background: #3b82f6; }
        .price-tag { font-size: 2em; color: #3b82f6; margin: 10px 0; font-weight: 800; }
        .features { text-align: left; margin: 20px 0; color: #94a3b8; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RevPCBAI 🤖</h1>
        <p><span class="status-dot"></span> Système Raspberry Pi 5 : <strong>OPÉRATIONNEL</strong></p>
        
        <hr style="border: 0; border-top: 1px solid #334155; margin: 25px 0;">
        
        <h3>Module : Injection USB-C (AI-Vision)</h3>
        <p>Automatisation du routage sur KiCad via Raspberry Pi</p>
        
        <div class="price-tag">0.50$ <small style="font-size: 0.4em; color: #64748b;">/ injection</small></div>
        
        <div class="features">
            <li>✅ Précision micrométrique via wxPoint</li>
            <li>✅ Compatible Raspberry Pi 5 + Hailo-8L</li>
            <li>✅ Injection directe sans librairie externe</li>
        </div>

        <button class="btn-pay" onclick="alert('Redirection vers Stripe pour le paiement sécurisé...')">
            DÉBLOQUER L'INJECTION
        </button>
    </div>
</body>
</html>
